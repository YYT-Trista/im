          <p>
            本會以會員(會員代表)大會為最高權力機構，會員(會員代表)大會閉會期間由理事會代行職權；監事會為監察機構。
          </p>
          <p>

          </p>
          <p>本會置秘書長一人，處理本會事務。</p>
