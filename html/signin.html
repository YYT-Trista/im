<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../image/CSIM.png">
    <link rel="stylesheet" href="../css/signin.css">
</head>
<body>

    <div class="split-container">
        <div class="rightbox">
            
            <a href="../index.html" class="back-btn">
                <ion-icon name="arrow-back-outline"></ion-icon>返回首頁
            </a>
            
            <div class="login-card">
                <img src="../image/CSIM.png" alt="CSIM Logo">
                <h2>登入會員</h2>
                <br>
                
                <form>
                    <div class="input-group">
                        <label>使用者名稱</label>
                        <input type="text" placeholder="請輸入使用者名稱">
                    </div>
                    
                    <div class="input-group">
                        <label>密碼</label>
                        <input type="password" placeholder="請輸入密碼">
                    </div>
                    <br>

                    <button type="submit" class="button">登 入</button>
                </form>
            </div>

        </div>
    </div>
    
</body>
</html>
