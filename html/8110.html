        <h3>活動日期: 2016/07/29</h3>
        <p>
          本次(第22屆)海峽兩岸資訊管理發展與策略學術研討會於2016/7/29 ~
          7/31舉辦於臺灣，由國立臺北科技大學資訊與財金管理系承辦，本次會議承襲往年的精神，廣邀臺海兩岸四地的學者們出席共襄盛舉，交流資訊科技領域的研究與實務經驗。
